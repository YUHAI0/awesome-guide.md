name: Update README from Issue

on:
  issues:
    types: [opened, edited, reopened, labeled]

permissions:
  contents: write
  issues: write

jobs:
  update-readme:
    if: startsWith(github.event.issue.title, 'Add:')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Write issue body
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            fs.writeFileSync('issue-body.md', context.payload.issue.body || '', 'utf8');

      - name: Check approval
        id: approval
        uses: actions/github-script@v7
        with:
          script: |
            const isApprovedLabel =
              context.payload.action === 'labeled' &&
              context.payload.label?.name === 'approved';
            let isAdmin = false;
            if (isApprovedLabel) {
              try {
                const permission = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  username: context.actor,
                });
                isAdmin = permission.data.permission === 'admin';
              } catch (error) {
                core.warning(`Cannot read collaborator permission for ${context.actor}: ${error.message}`);
              }
            }
            core.setOutput('approved', String(isApprovedLabel && isAdmin));
            core.setOutput('admin', String(isAdmin));

      - name: Validate issue
        id: validate
        if: steps.approval.outputs.approved != 'true'
        env:
          ISSUE_BODY_FILE: issue-body.md
          VALIDATE_ONLY: 'true'
        run: node scripts/update-readme-from-issue.mjs

      - name: Update README
        id: update
        if: steps.approval.outputs.approved == 'true'
        env:
          ISSUE_BODY_FILE: issue-body.md
        run: node scripts/update-readme-from-issue.mjs

      - name: Run tests
        if: steps.update.outputs.status == 'updated'
        run: node --test scripts/update-readme-from-issue.test.mjs

      - name: Commit README update
        if: steps.update.outputs.status == 'updated'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: 添加 issue #${{ github.event.issue.number }} 的指南条目"
          git push

      - name: Comment success
        if: steps.update.outputs.status == 'updated'
        uses: actions/github-script@v7
        env:
          UPDATE_MESSAGE: ${{ steps.update.outputs.message }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `已根据该 Issue 更新 README。\n\n${process.env.UPDATE_MESSAGE}`
            })

      - name: Comment waiting for admin approval
        if: steps.validate.outputs.status == 'valid'
        uses: actions/github-script@v7
        env:
          UPDATE_MESSAGE: ${{ steps.validate.outputs.message }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: process.env.UPDATE_MESSAGE
            })

      - name: Comment non-admin approval
        if: github.event.action == 'labeled' && github.event.label.name == 'approved' && steps.approval.outputs.admin != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '已收到 `approved` 标签，但只有仓库管理者（admin 权限）添加该标签时，Action 才会写入 README。'
            })

      - name: Comment invalid issue
        if: steps.update.outputs.status == 'invalid' || steps.validate.outputs.status == 'invalid'
        uses: actions/github-script@v7
        env:
          UPDATE_MESSAGE: ${{ steps.update.outputs.message || steps.validate.outputs.message }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `暂未更新 README。\n\n${process.env.UPDATE_MESSAGE}`
            })
