name: Update README from Issue

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  issues: write

jobs:
  update-readme:
    if: startsWith(github.event.issue.title, 'Add:')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Write issue body
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            fs.writeFileSync('issue-body.md', context.payload.issue.body || '', 'utf8');

      - name: Update README files
        id: update
        env:
          ISSUE_BODY_FILE: issue-body.md
        run: node scripts/update-readme-from-issue.mjs

      - name: Run tests
        if: steps.update.outputs.status == 'updated'
        run: node --test scripts/update-readme-from-issue.test.mjs

      - name: Commit README update
        if: steps.update.outputs.status == 'updated'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md README.en.md
          git commit -m "docs: 添加 issue #${{ github.event.issue.number }} 的指南条目"
          git push

      - name: Comment success
        if: steps.update.outputs.status == 'updated'
        uses: actions/github-script@v7
        env:
          UPDATE_MESSAGE: ${{ steps.update.outputs.message }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `已根据该 Issue 更新 README。\n\n${process.env.UPDATE_MESSAGE}`
            })

      - name: Comment invalid issue
        if: steps.update.outputs.status == 'invalid'
        uses: actions/github-script@v7
        env:
          UPDATE_MESSAGE: ${{ steps.update.outputs.message }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `暂未更新 README。\n\n${process.env.UPDATE_MESSAGE}`
            })
